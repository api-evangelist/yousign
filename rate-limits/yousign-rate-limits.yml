name: Yousign API Rate Limits
description: Rate limiting policies for the Yousign API across sandbox and production environments. Limits are applied per API key and designed to encourage efficient integration patterns using webhooks rather than polling.
url: https://developers.yousign.com/docs/limits-new
specificationVersion: '0.1'
limits:
  - name: Sandbox Rate Limit - Per Minute
    description: Maximum number of API queries allowed per minute in the sandbox (development) environment.
    environment: sandbox
    unit: requests
    period: minute
    limit: 30
    url: https://developers.yousign.com/docs/limits-new
  - name: Sandbox Rate Limit - Per Hour
    description: Maximum number of API queries allowed per hour in the sandbox (development) environment.
    environment: sandbox
    unit: requests
    period: hour
    limit: 200
    url: https://developers.yousign.com/docs/limits-new
  - name: Sandbox Trial - Daily Signature Requests
    description: Maximum number of Signature Requests that can be sent per day in the API trial/sandbox environment (limit introduced June 2025).
    environment: sandbox
    unit: signature-requests
    period: day
    limit: 100
    url: https://developers.yousign.com/changelog/new-api-trial-limits
  - name: Sandbox Trial - Signers Per Request
    description: Maximum number of Signers allowed per Signature Request in the API trial/sandbox environment.
    environment: sandbox
    unit: signers
    period: per-request
    limit: 5
    url: https://developers.yousign.com/changelog/new-api-trial-limits
  - name: Sandbox Trial - Approvers Per Request
    description: Maximum number of Approvers allowed per Signature Request in the API trial/sandbox environment.
    environment: sandbox
    unit: approvers
    period: per-request
    limit: 5
    url: https://developers.yousign.com/changelog/new-api-trial-limits
  - name: Sandbox Trial - Followers Per Request
    description: Maximum number of Followers allowed per Signature Request in the API trial/sandbox environment.
    environment: sandbox
    unit: followers
    period: per-request
    limit: 5
    url: https://developers.yousign.com/changelog/new-api-trial-limits
  - name: Production Rate Limit
    description: Production environment rate limits differ from sandbox limits. Exact production limits are determined by plan tier and may be customized upon request for customers with legitimate high-volume use cases.
    environment: production
    unit: requests
    period: varies
    limit: custom
    url: https://developers.yousign.com/docs/limits-new
notes:
  - Rate limits may be customized upon request for production environments by contacting Yousign support. See https://developers.yousign.com/changelog/rate-limit-customisation-is-possible
  - Yousign recommends using webhooks instead of polling to avoid hitting rate limits efficiently.
  - Sandbox and production environments maintain separate rate limit values as of February 2024.
headers:
  - name: X-RateLimit-Limit
    description: The maximum number of requests allowed in the current period.
  - name: X-RateLimit-Remaining
    description: The number of requests remaining in the current period.
  - name: X-RateLimit-Reset
    description: Unix timestamp when the current rate limit window resets.
