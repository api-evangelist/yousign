    SignatureRequestInList:
      properties:
        id:
          example: 89120884-d29a-4b1a-ac7b-a9e73a872795
          minLength: 1
          type: string
        status:
          $ref: '#/components/schemas/SignatureRequestStatus'
        name:
          example: signature request name
          maxLength: 128
          minLength: 1
          type: string
        delivery_mode:
          enum:
          - email
          - none
          type: string
        created_at:
          example: '2024-01-18T22:59:00Z'
          format: date-time
          minLength: 1
          type: string
        activated_at:
          description: 'Timestamp indicating when the Signature Request was activated
            and made available to its recipients.\

            Returns `null` if the Signature Request is still in `draft`.

            '
          example: '2024-01-18T22:59:00Z'
          format: date-time
          nullable: true
          readOnly: true
          type: string
        completed_at:
          description: 'Timestamp indicating when the Signature Request reached the
            `done` status, i.e. all required Signers have signed and all Approvers
            have approved.\

            Returns `null` if the Signature Request is not yet complete.

            '
          example: '2024-01-18T22:59:00Z'
          format: date-time
          nullable: true
          readOnly: true
          type: string
        approved_at:
          description: 'Timestamp indicating when all Approvers have approved the
            Signature Request when custom recipient flow is not enabled.\

            Returns `null` if no approvers are configured, or if at least one approver
            has not yet approved, or when `custom_recipient_order` is enabled.

            '
          example: '2024-01-18T22:59:00Z'
          format: date-time
          nullable: true
          readOnly: true
