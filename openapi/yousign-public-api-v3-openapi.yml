    AnalysisType:
      additionalProperties: false
      description: 'Controls what the Document Analysis performs.


        - When `extraction` is `true` (default), data is extracted from the document
        and a document `type` is **required**.

        - When `extraction` is `false` (fraud-only), no `type` must be provided and
        `fraud_level` must be `advanced`.

        '
      properties:
        extraction:
          default: true
          description: 'Whether to extract data from the document. Defaults to `true`
            when omitted.

            Set to `false` to run a fraud-only analysis (no data extraction).

            '
          example: true
          type: boolean
        fraud_level:
          description: 'Level of fraud detection to run. `null` (default) disables
            fraud detection.

            Not supported for type `tax_notice`. Must be `advanced` when `extraction`
            is `false`.

            '
          enum:
          - none
          - advanced
          example: advanced
          nullable: true
          type: string
      title: AnalysisType
      type: object
    FraudRiskAnalysis:
      additionalProperties: false
      description: 'Result of the fraud detection analysis. `null` when no fraud detection
        verdict is available

