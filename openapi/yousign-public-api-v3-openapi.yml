            an Electronic Seal.
          example: 160473f9-156f-4583-848c-cbc3dec49b4a
          format: uuid
          type: string
        image_id:
          description: Specify which Electronic Seal Image to use for creating an
            Electronic Seal.
          example: 333fa90a-a629-4708-8fe9-160dcb055a9b
          format: uuid
          nullable: true
          type: string
