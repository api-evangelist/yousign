        \ can be requested as follows:\n- **Bank Account verification**: This option\
        \ only checks the validity of the Bank Account document.\n- **Bank Account\
        \ verification with legal person**: This option checks both:\n  - the validity\
        \ of the Bank Account document\n  - the coherence between the provided **legal\
        \ person** names and those on the document.\n- **Bank Account verification\
        \ with natural person**: This option checks both:\n  - the validity of the\
        \ Bank Account document\n  - the coherence between the provided **natural\
        \ person** names and those on the document.\n\nRelated guide: [Bank Account\
        \ Document Verification](https://developers.yousign.com/docs/bank-account-details-verification)\n\
        \n**ℹ️ This endpoint accepts two request body formats — pick the one that\
        \ matches your use case:**\n- \U0001F4C1 `multipart/form-data` — upload a\
        \ binary file containing the bank account details (IBAN/BIC).\n- \U0001F4DD\
        \ `application/json` — reference an existing Workflow Session Applicant by\
        \ ID.\n\n**\U0001F513 Endpoint access**\n- Environments: `production`, `sandbox`\n\
        - API key scopes: `organization`, `workspace`\n- Plans: `pro`, `scale`\n-\
