openapi: 3.0.0
info:
  contact:
    email: contact@yousign.com
    name: Support
    url: https://yousign.com/contact
  description: Build the best experience of digital signature through your own platform.
    Increase your conversion rates, leverage your data and reduce your costs with
    Yousign API.
  license:
    name: proprietary
    url: https://yousign.com/terms
  title: Public Api v3
  version: '3.0'
servers:
- description: Sandbox URL
  url: https://api-sandbox.yousign.app/v3
- description: Production URL
  url: https://api.yousign.app/v3
security:
- bearerAuth: []
tags:
- description: Person responsible for validating a Signature Request.
  name: Approver
- description: Set of documents generated once a Signature Request is completed.
  name: Audit Trail
- description: This resource provides tracking of the API usage.
  name: Consumption
- description: A saved profile containing some information (name, language, email
    address, etc.) that can be re-used to create a Signer, Approver, or Follower.
  name: Contact
- description: Allows to customize the look and feel of the signature experience.
  name: Custom Experience
- description: A configurable field (list or text) allowing to tag Signature Requests
    with structured values.
  name: Custom Property
- description: Document that is attached to the Signature Request.
  name: Document
- description: This resource is the digital version of the company stamp.
  name: Electronic Seal
- description: Set of documents generated once a Electronic Seal is completed.
  name: Electronic Seal Audit Trail
- description: Document that is attached to the Electronic Seal.
  name: Electronic Seal Document
- description: Set of Image which can be used in Electronic Seal.
  name: Electronic Seal Image
- description: Dynamic content that will appear on a Document.
  name: Field
- description: Person who is kept informed about the progress of the signing process
    without being an Approver or a Signer.
  name: Follower
- description: Categorization tag that can be added to a Signature Request.
  name: Label
- description: Extra information attached to a Signature Request.
  name: Metadata
- description: Process of inviting Signers to sign a Document.
  name: Signature Request
- description: Person who will sign a Signature Request.
  name: Signer
- description: Process of asking signers to upload specific documents during the signature
    process.
  name: Signer Document Request
- description: Process of asking signers to consent to specific needs during the signature
    process.
  name: Signer Consent Request
- description: A person who can access the Yousign web app of your organization.
  name: User
- description: The Invitation of a new User to join the Yousign organization.
  name: User Invitation
- description: Webhook subscription; enables real-time notifications about events
    that happen in your Yousign organization.
  name: Webhook
- description: A way to partition your Yousign organization into separate entities.
  name: Workspace
- description: Pre-configuration of all elements of a Signature Request, such as Documents,
    Signers, Approvers, Fields, and settings.
  name: Template
- description: A feature allowing to store and retrieve documents on Arkhineo for
    some customers migrated from v2
  name: Archive
- description: Operations that are in beta version, and may be changed or removed
    in the future.
  name: Beta
- description: Operations that are no longer recommended for use.
  name: Deprecated
- description: KYC Process of verifying the identity associated with a bank account
    document.
  name: Bank Account Verification
- description: KYC Process of verifying the identity associated with an identity document.
  name: Identity Document Verification
- description: KYC Process of verifying the identity associated with a document.
  name: Identity Video Verification
- description: Retrieve structured and official data about a company.
  name: Company Verification
- description: Check if individuals appear on international sanctions lists or as
    politically exposed persons (PEPs).
  name: Watchlist Verification
- description: KYC Process of verifying a proof of address document.
  name: Proof of Address Verification
- description: KYC Process of verifying a person’s or company’s banking information
    via the Sepamail DIAMOND network.
  name: Bank Account Lookup Verification
- description: Instance of a workflow created each time a customer goes through it.
  name: Workflow Session
- description: An applicant associated with a Workflow Session.
  name: Applicant
- description: Structure of a workflow defined by the type of Actions a customer must
    complete.
  name: Workflow Template
- description: Analyze a document and extract structured data.
  name: Document Analysis
- description: Set of documents generated once a Verification is completed.
  name: Verification Audit Trail
