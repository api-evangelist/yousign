        \ document type.\n\nRelated guide: [Document Analysis](https://developers.yousign.com/docs/document-analysis)\n\
        \n**ℹ️ This endpoint accepts two request body formats — pick the one that\
        \ matches your use case:**\n- \U0001F4C1 `multipart/form-data` — upload a\
        \ binary file containing the document to analyse.\n- \U0001F4DD `application/json`\
        \ — reference an existing Workflow Session Applicant by ID.\n\n**\U0001F50E\
        \ Analysis type (`analysis_type`)**\n- `extraction: true` (default): data\
        \ is extracted from the document. A document `type` is **required**. Optionally\
        \ set `fraud_level` to `advanced` to also run fraud detection (not supported\
        \ for `tax_notice`).\n- `extraction: false` (fraud-only): no data extraction.\
        \ `type` must be omitted and `fraud_level` must be `advanced`.\n\nOn `multipart/form-data`,\
        \ `analysis_type` is sent as form fields (`analysis_type[extraction]`, `analysis_type[fraud_level]`)\
        \ and `extraction` is a string (`\"true\"`/`\"false\"`).\n\n**\U0001F513 Endpoint\
        \ access**\n- Environments: `production`, `sandbox`\n- API key scopes: `organization`,\
        \ `workspace`\n- Plans: `pro`, `scale`\n- Add-ons (for production access):\n\
        \  - For extraction only `Document Analysis`\n  - For Fraud Detection and\
        \ Extraction `Document Trust Advanced`\n"
