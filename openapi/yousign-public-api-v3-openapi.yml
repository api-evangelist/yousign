      - $ref: '#/components/schemas/New_Signer_From_Scratch'
      - $ref: '#/components/schemas/New_Signer_From_Existing_User'
      - $ref: '#/components/schemas/New_Signer_From_Existing_Contact'
      - $ref: '#/components/schemas/New_Signer_From_Identity_Verification'
      type: object
    UpdateSigner:
      properties:
        info:
          $ref: '#/components/schemas/UpdateSigner_info'
        insert_after_id:
          description: 'ID of the recipient this one must follow in an ordered flow;
            they will only be asked to act after that recipient.

            When `custom_recipient_order` is enabled, this can reference any approver
            or signer.

            When `custom_recipient_order` is disabled, the referenced ID must be a
            signer. `ordered_signers` must be enabled on the Signature Request.

            '
          example: 8b6ed2f3-244f-487a-baa1-bbe4f51c8744
          format: uuid
          nullable: true
          type: string
        group_with_id:
          description: 'ID of another recipient (Approver or Signer); both will be
            allowed to act in parallel in an ordered flow.

            Only available when `custom_recipient_order` is enabled.

            '
          example: 8b6ed2f3-244f-487a-baa1-bbe4f51c8744
          format: uuid
          nullable: true
          type: string
        signature_level:
          default: electronic_signature
          enum:
          - electronic_signature
          - advanced_electronic_signature
          - qualified_electronic_signature
          type: string
        signature_authentication_mode:
          description: 'Method to authenticate the Signers. Authentication via SMS
            one-time password (otp_sms) is unavailable for phone numbers in China.

            When the Signature Request in `draft` status, updating the authentication
            mode is available for all Signers, no matter their `signature_level`.\

            When the Signature Request is in `approval` or `ongoing` status, updating
            the authentication mode is only available for Simple Electronic Signature
            if Signers have an `initiated` or `notified` status.

            '
          enum:
          - otp_email
          - otp_sms
          - no_otp
          nullable: true
          type: string
        redirect_urls:
          $ref: '#/components/schemas/New_Signer_From_Scratch_redirect_urls'
        custom_text:
          $ref: '#/components/schemas/New_Signer_From_Scratch_custom_text'
        delivery_mode:
          $ref: '#/components/schemas/SignerDeliveryMode'
        identification_attestation_id:
          maxLength: 255
          minLength: 1
          nullable: true
          type: string
        email_notification:
          $ref: '#/components/schemas/EmailNotification_1'
        pre_identity_verification_required:
          description: Defines the way the Signer's Identity Documents will be uploaded
            for Verification. If set to `true`, `signature_level`should be equal to
            `advanced_electronic_signature` and `delivery_mode` set to `none`.
          type: boolean
        excluded_documents:
          $ref: '#/components/schemas/ExcludedDocuments'
      type: object
