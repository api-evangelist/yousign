    AnalysisTypeMultipart:
      additionalProperties: false
      description: 'Same as `analysis_type` on the JSON path, but sent as `multipart/form-data`.

        Because form-data has no native boolean, `extraction` is a string (`"true"`/`"false"`).


        - When `extraction` is `"true"` (default), data is extracted from the document
        and a document `type` is **required**.

        - When `extraction` is `"false"` (fraud-only), no `type` must be provided
        and `fraud_level` must be `advanced`.

        '
      properties:
        extraction:
          default: 'true'
          description: 'Whether to extract data from the document. Defaults to `"true"`
            when omitted.

            Set to `"false"` to run a fraud-only analysis (no data extraction).

            '
          enum:
          - 'true'
          - 'false'
          example: 'true'
          type: string
        fraud_level:
          description: 'Level of fraud detection to run. `null` (default) disables
            fraud detection.

            Not supported for type `tax_notice`. Must be `advanced` when `extraction`
            is `"false"`.

            '
          enum:
          - none
          - advanced
          example: advanced
          nullable: true
          type: string
      title: AnalysisType
      type: object
    DocumentAnalysisCheck:
      additionalProperties: false
      description: Represents the result of checking if an extracted value matches
        an expected value with different levels of match (exact, close, or no match).
      example:
        extracted: John Doe
        expected: John Doe
        match_level: exact
      properties:
