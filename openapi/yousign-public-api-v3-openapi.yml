    CreateDocumentFromMultipart:
      properties:
        file:
          description: 'Binary file. Accepted formats: `PDF`, `DOCX`, `JPEG`, `JPG`
            and `PNG`. All files are converted to PDF upon upload.'
          format: binary
          type: string
        nature:
          description: 'Can take two values: `signable_document` or `attachment`.
            Files in `JPEG`, `JPG`, and `PNG` format can only be of `attachment` nature.'
          enum:
          - attachment
          - signable_document
          type: string
        insert_after_id:
          description: Insert just after the position of the specified document id.
          example: 8b6ed2f3-244f-487a-baa1-bbe4f51c8744
          format: uuid
          nullable: true
          type: string
        password:
          example: MyPa$$word
          type: string
        name:
          description: The document name. If not set, will use the uploaded document
            name. This value should contain any characters except "\", "/" and can\'t
            start and finish with a space.
          example: file1
          maxLength: 128
          minLength: 1
          pattern: ^(?!\s)[^\/\\]+(?<!\s)$
          type: string
        initials:
          allOf:
          - $ref: '#/components/schemas/InitialsArea'
          nullable: true
          type: object
        parse_anchors:
          default: false
          description: If true, the system will parse the document exclusively for
            Signature-type Smart Anchors and automatically generate the required fields.
          example: true
          nullable: true
          type: boolean
        excluded_approvers:
          $ref: '#/components/schemas/DocumentExcludedApprovers'
        excluded_signers:
          $ref: '#/components/schemas/DocumentExcludedSigners'
      required:
      - file
      - nature
      type: object
