    New_Signature_Request_From_Scratch:
      description: Create a new Signature Request from scratch
      properties:
        name:
          description: 'Name of the signature request.\

            This property is a [Safe String](https://developers.yousign.com/reference/oas-specification#safe-string).

            '
          format: safe-string
          maxLength: 128
          minLength: 1
          type: string
        delivery_mode:
          description: Delivery mode to notify Signers.
          enum:
          - none
          - email
          type: string
        ordered_signers:
          description: Enable an ordered workflow, each Signer will be requested to
            sign in a sequential order
          example: true
          type: boolean
        ordered_approvers:
          description: 'When enabled, Approvers are requested to approve sequentially.

            Each Approver will be invited to approve only once the previous one has
            completed their approval.

            '
          example: true
          type: boolean
        custom_recipient_order:
          description: 'When enabled, Approvers and Signers are requested to approve
            depending of a sequence composed of stages.

            Every recipients present in a stage will be invited to approve or sign
            parallelly, and stages are sequential each other.

            When `custom_recipient_order` is enabled, `ordered_approvers` and `ordered_signers`
            are ignored.

            '
          example: true
          type: boolean
        reminder_settings:
          $ref: '#/components/schemas/New_Signature_Request_From_Scratch_reminder_settings'
        timezone:
          $ref: '#/components/schemas/SignatureRequestTimeZone'
        email_custom_note:
          deprecated: true
          description: 'A custom note added to emails sent to signers.\

            This property is a [Safe String](https://developers.yousign.com/reference/oas-specification#safe-string)
            allowing email and leading or trailing whitespaces.

            '
          example: Please sign these documents as soon as possible.
          format: safe-string
          maxLength: 500
          nullable: true
          type: string
        expiration_date:
          description: 'Due date of the Signature Request (yyyy-mm-dd). Defaults to
            6 months after initiation.

            The date cannot be in the past and cannot be more than one year after
            initiation.

            '
          format: date
          pattern: ^\d{4}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])$
          type: string
        template_id:
          description: Create a Signature Request from an existing template.
          example: 9a93d3b5-fb3b-4abf-9e70-26315b33506c
          format: uuid
          type: string
        external_id:
          description: Store a custom id that will be added to webhooks & appended
            to redirect urls.
          maxLength: 255
          nullable: true
          pattern: ^[\w\-@.%+]+$
          type: string
        branding_id:
          deprecated: true
          description: Use a specific branding to customize the signature experience.
          example: 3a93d3b5-fb3b-4abf-9e70-26315b33506b
          format: uuid
          nullable: true
          type: string
        custom_experience_id:
          description: Use a specific Custom Experience to customize the signature
            experience.
          example: 3a93d3b5-fb3b-4abf-9e70-26315b33506b
          format: uuid
          nullable: true
          type: string
        documents:
          deprecated: true
          description: You can directly attach orphan Documents to the Signature Request.
          items:
            example: 89120884-d29a-4b1a-ac7b-a9e73a872795
            format: uuid
            type: string
          maxItems: 5
          type: array
          uniqueItems: true
        signers:
          deprecated: true
          description: Can only be used if you add documents at the same time.
          items:
            $ref: '#/components/schemas/New_Signature_Request_From_Scratch_signers_inner'
          type: array
        workspace_id:
          description: Scope the signature request to a specific workspace. If template_id
            is filled and Template is already linked to a Workspace, keep this field
            to null ; the created Signature Request will be scoped to Template's Workspace.
          example: 89120884-d29a-4b1a-ac7b-a9e73a872795
          format: uuid
          nullable: true
          type: string
        audit_trail_locale:
          allOf:
          - $ref: '#/components/schemas/AuditTrailLocale'
          description: Define the locale for the generated audit trail.
          nullable: true
          type: string
        signers_allowed_to_decline:
          default: false
          description: Allowing signers to decline to sign.
          example: true
          type: boolean
        email_notification:
          $ref: '#/components/schemas/SignatureRequest_EmailNotification'
        template_placeholders:
          $ref: '#/components/schemas/New_Signature_Request_From_Scratch_template_placeholders'
        archiving:
          $ref: '#/components/schemas/Archiving'
        labels:
          description: List of Labels to associate with the Signature Request. Labels
            are identified by their ID.
          example:
          - 3a93d3b5-fb3b-4abf-9e70-26315b33506b
          - 89120884-d29a-4b1a-ac7b-a9e73a872795
          items:
            format: uuid
            type: string
          maxItems: 50
          type: array
        workflow_session_id:
          $ref: '#/components/schemas/WorkflowSessionId'
        previous_attempt_id:
          $ref: '#/components/schemas/PreviousAttemptId'
      required:
      - delivery_mode
      - name
      title: New Signature Request From Scratch
      type: object
