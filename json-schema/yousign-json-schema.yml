  CreateElectronicSealDocumentFromJson:
    oneOf:
    - $ref: '#/components/schemas/From_Electronic_Seal_Document'
    - $ref: '#/components/schemas/From_Signature_Request_Document'
    type: object
  ElectronicSealDocument:
    properties:
      id:
        example: 1365283d-0ba5-4a08-9a58-9818ef428320
        format: uuid
        type: string
      total_pages:
        minimum: 1
        type: integer
      created_at:
        example: '2024-01-18T22:59:00Z'
        format: date-time
        type: string
      workspace_id:
        description: Unique identifier of the Workspace in which this Electronic Seal
          Document is scoped.
        example: ea11f308-4531-42f9-8218-96b37b7ebb19
        format: uuid
        type: string
    required:
    - created_at
    - id
    - total_pages
    - workspace_id
    type: object
  ElectronicSealImage:
    properties:
      id:
        example: 1365283d-0ba5-4a08-9a58-9818ef428320
        format: uuid
        type: string
      name:
        example: My seal image
        type: string
      created_at:
        example: '2024-01-18T22:59:00Z'
        format: date-time
        type: string
      workspace_id:
        description: Unique identifier of the Workspace in which this Electronic Seal
          Image is scoped.
        example: ea11f308-4531-42f9-8218-96b37b7ebb19
        format: uuid
        type: string
    required:
    - created_at
    - id
    - name
    - workspace_id
    type: object
  UploadElectronicSealImage:
    properties:
      file:
        description: 'Seal Image to be displayed on a sealed Document. Accepted formats:
          PNG/JPG/GIF, max 500 Ko.'
        format: binary
        type: string
      name:
        description: 'Name of the Seal Image.\

          This property is a [Safe String](https://developers.yousign.com/reference/oas-specification#safe-string).

          '
        example: My seal image
        format: safe-string
        type: string
    required:
    - file
    - name
    type: object
  CreateElectronicSealImagePreviewPayload:
    additionalProperties: false
    properties:
      image_id:
        description: The ID of an existing Electronic Seal Image to use as the visual
          stamp.
        example: 04c9bf7e-e466-4204-97d2-d21cf5b314e4
        format: uuid
        nullable: true
        type: string
      field:
        $ref: '#/components/schemas/CreateElectronicSealImagePreviewPayload_field'
    required:
    - field
    title: CreateElectronicSealImagePreviewPayload
    type: object
  CreateElectronicSealPayload:
    properties:
      document_id:
        description: Specify which Electronic Seal Document to use for creating an
          Electronic Seal.
        example: 160473f9-156f-4583-848c-cbc3dec49b4a
        format: uuid
        type: string
      image_id:
        description: Specify which Electronic Seal Image to use for creating an Electronic
          Seal.
        example: 333fa90a-a629-4708-8fe9-160dcb055a9b
        format: uuid
        nullable: true
        type: string
      external_id:
        description: Store a custom id that will be added to webhooks
        example: externalId-123
        maxLength: 255
        nullable: true
        pattern: ^[\w\-@.%+]+$
        type: string
      fields:
        description: Fields you want to add to your Document. At least one Seal Field
          is mandatory.
        items:
          $ref: '#/components/schemas/CreateElectronicSealPayload_fields_inner'
        type: array
      signature_level:
        description: Level of Electronic Seal for your Document
        enum:
        - electronic_signature
        - advanced_electronic_signature
        nullable: true
        type: string
      certificate_id:
        description: Specify which certificate to use for creating an Electronic Seal
          (only available for advanced_electronic_signature level).
        example: a3d84df7-b45e-4321-ae9e-7f5397acb225
        format: uuid
        nullable: true
        type: string
    required:
    - document_id
    - fields
    title: CreateElectronicSealPayload
    type: object
  ElectronicSeal:
    properties:
      id:
        example: 1365283d-0ba5-4a08-9a58-9818ef428320
        format: uuid
        type: string
      status:
        enum:
        - pending
        - processing
        - done
        - error
        example: pending
        type: string
      created_at:
        example: '2024-01-18T22:59:00Z'
        format: date-time
        type: string
      document_id:
        example: 37646975-7e73-41f1-be7f-f4d85d181d03
        format: uuid
        type: string
      timestamp:
        type: boolean
      image_id:
        example: 6c82bd7a-d7f7-45e0-82f4-b92222567346
        format: uuid
        nullable: true
        type: string
      external_id:
        description: Store a custom id that will be added to webhooks
        example: externalId-123
        maxLength: 255
        nullable: true
        pattern: ^[\w\-@.%+]+$
        type: string
      signature_level:
        enum:
        - electronic_signature
        - advanced_electronic_signature
        example: electronic_signature
        type: string
      workspace_id:
        description: Unique identifier of the Workspace in which this Electronic Seal
          is scoped.
        example: 6c82bd7a-d7f7-45e0-82f4-b92222567346
        format: uuid
        type: string
    required:
    - created_at
    - document_id
    - external_id
    - id
    - image_id
    - signature_level
    - status
    - timestamp
    - workspace_id
    title: ElectronicSeal
    type: object
  ElectronicSealAuditTrail:
