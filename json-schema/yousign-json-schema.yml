$schema: http://json-schema.org/draft-07/schema#
$id: https://raw.githubusercontent.com/api-evangelist/yousign/main/json-schema/yousign-json-schema.json
title: Yousign Public API v3 Schemas
description: JSON Schema definitions extracted from the Yousign Public API v3 OpenAPI
  specification.
definitions:
  UploadArchivedFile:
    properties:
      file:
        description: File to be uploaded
        format: binary
        type: string
      workspace_id:
        example: 69120884-d29a-4b1a-ac7b-a9e73a872795
        format: uuid
        nullable: true
        type: string
      archive_y:
        nullable: true
        pattern: ^(true|false)?$
        type: string
      tags:
        description: Tags for the file
        items:
          maxLength: 1000
          minLength: 1
          pattern: '[^\x00-\x1F\x7F]*'
          type: string
        nullable: true
        type: array
      expired_at:
        description: Expiration date of the file
        example: '2024-06-24 09:26:44'
        nullable: true
        pattern: ^(\d{4})-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01]) ([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$
        type: string
    required:
    - file
    type: object
  ArchivedFile:
    description: ArchivedFile
    properties:
      id:
        example: 21ac9d25-e24d-4564-b964-d67eed561ca9
        format: uuid
        minLength: 1
        type: string
      sha256:
        description: Sha256 checksum
        example: 6ecf29381314217530c02c64a97050a0a6a0944bb974b6b417588277e289aef0
        maxLength: 64
        minLength: 64
        type: string
      filename:
        maxLength: 255
        minLength: 1
        type: string
      created_at:
        description: Creation date of the file
        example: '2024-01-18T22:59:00Z'
        format: date-time
        type: string
      expired_at:
        description: Expiration date of the file
        example: '2025-01-18T22:59:00Z'
        format: date-time
        nullable: true
        type: string
      content_type:
        example: application/pdf
        type: string
      size:
        example: 123456
        minimum: 1
        type: integer
      archive_y_identifier:
        description: Identifier that allows to save the file in an additional storage.
        nullable: true
        type: string
      tags:
        description: Tags for the file
        items:
          maxLength: 1000
          minLength: 1
          pattern: '[^\x00-\x1F\x7F]*'
          type: string
        nullable: true
        type: array
      workspace_id:
        example: 528e2077-d0c1-4506-acd9-fac35a9cb7b4
        format: uuid
        minLength: 1
        type: string
    required:
    - archive_y_identifier
    - content_type
    - created_at
    - expired_at
    - filename
    - id
    - sha256
    - size
    - tags
    - workspace_id
    title: ArchivedFile
    type: object
  UUID:
    description: The unique identifier for a resource.
    example: 9a93d3b5-fb3b-4abf-9e70-26315b33506c
    format: uuid
    type: string
  DateYMD:
    example: '2022-12-10'
    format: date
    type: string
  Consumption:
    properties:
      app:
        $ref: '#/components/schemas/Consumption_app'
      api:
        $ref: '#/components/schemas/Consumption_api'
      connector:
        $ref: '#/components/schemas/Consumption_app'
    required:
    - api
    - app
    - connector
    type: object
  AddonConsumptionsName:
    enum:
    - bank_account_connection_verification
    - bank_account_lookup_verification
    - bank_account_verification
    - company_verification
    - company_de_verification
    - company_it_verification
    - document_analysis_verification
    - document_analysis_tax_notice_verification
    - document_trust_advanced_verification
    - identity_document_verification
    - identity_video_face_recognition_verification
    - certified_identity_pvid
    - identity_video_verification
    - proof_of_address_verification
    - watchlist_verification
    - advanced_electronic_seal
    - advanced_electronic_signature
    - advanced_electronic_signature_pre_verified
    - archiving
    - electronic_seal
    - electronic_signature
    - qualified_electronic_signature_identity_verification
    - qualified_electronic_signature_saved_identity
    type: string
  AddonConsumption:
    properties:
      name:
        $ref: '#/components/schemas/AddonConsumptionsName'
      start_at:
        description: Beginning of the addon subscription
        example: '2020-05-18T07:25:36Z'
        format: date-time
        type: string
      end_at:
        description: End of the addon subscription
        example: '2020-05-18T07:25:36Z'
        format: date-time
        type: string
      quota:
        minimum: 0
        type: integer
      consumed:
        minimum: 0
        type: integer
      provisioned:
        description: Only available for qualified_electronic_signature_identity_verification
          and qualified_electronic_signature_saved_identity addons
        minimum: 0
        type: integer
    required:
    - consumed
    - end_at
    - name
    - quota
    - start_at
    type: object
  PaginationWithUpdatedAt:
    description: Cursor based pagination
    properties:
      next_cursor:
        minLength: 1
        nullable: true
        type: string
      updated_at:
        example: '2024-01-18T22:59:00Z'
        format: date-time
        type: string
    required:
    - next_cursor
    - updated_at
    type: object
  DetailedConsumption:
    properties:
      source:
        enum:
        - app
        - api
        - connector
        type: string
      type:
        enum:
        - invited_signers
        - electronic_seals
        - identification_attempts
        - archiving
        - verifications
        type: string
      level:
        description: 'Specifies the level of the consumed eSignature, eSeal and QES
          identification attempts: simple, advanced, or qualified.

          Only set when type is either `invited_signer`, `electronic_seals`, `identification_attempts`.

          '
        enum:
        - simple
        - advanced
        - qualified
        type: string
      verification_type:
        $ref: '#/components/schemas/KycAddonConsumptionsName'
      identification_mode:
        description: Only set if type is identification_attempts.
        enum:
        - identity_verification
        - saved_identity
        type: string
      workspace_id:
        description: Only set if breakdown is set on workspaces.
        example: 8b6ed2f3-244f-487a-baa1-bbe4f51c8744
        format: uuid
        minLength: 1
        type: string
      value:
        description: Count of items or file size in case of archiving.
        minimum: 1
        type: integer
    required:
    - source
    - type
    - value
    type: object
  Pagination:
    description: Metadata about the response.
    properties:
      next_cursor:
        description: 'Token to get the next page of results. If `null`, there are
          no more pages.

          '
        minLength: 1
        nullable: true
        type: string
    required:
    - next_cursor
    type: object
  ElectronicSealsConsumption:
    properties:
      seal_id:
        example: 0e8f7f8a-1b2c-4d3e-9f0a-b1c2d3e4f5a6
        format: uuid
        type: string
      document_id:
        example: 37646975-7e73-41f1-be7f-f4d85d181d03
        format: uuid
        type: string
      seal_level:
        description: Level of the Electronic Seal applied.
        enum:
        - electronic_signature
        - advanced_electronic_signature
        - qualified_electronic_signature_external
        example: electronic_signature
        type: string
      created_at:
        description: Creation time of the record
        example: '2024-05-01 12:00:00'
        type: string
      source:
        description: Origin of the operation.
        example: app
        type: string
      external_id:
        description: Optional user-defined identifier.
        example: ext-12345
        nullable: true
        type: string
      certificate_id:
        example: 6c82bd7a-d7f7-45e0-82f4-b92222567346
        format: uuid
        nullable: true
        type: string
      workspace_id:
        example: 9b6ed2f3-244f-487a-baa1-bbe4f51c8748
        format: uuid
        type: string
      authentication_key:
        description: Identifier of the key used for the operation.
        example: authkey_live_2x1s3k9p
        nullable: true
        type: string
      workspace_name:
        description: Name of the workspace.
        example: My workspace
        type: string
      workspace_external_name:
        description: External name of the workspace.
        example: My workspace
        nullable: true
        type: string
    required:
    - authentication_key
    - certificate_id
    - created_at
    - document_id
    - external_id
    - seal_id
    - seal_level
    - source
    - workspace_external_name
    - workspace_id
    - workspace_name
    type: object
  IdentificationsConsumption:
    properties:
      created_at:
        description: Creation time of the record
        example: '2024-05-01 12:00:00'
        type: string
      signer_id:
        example: 0e8f7f8a-1b2c-4d3e-9f0a-b1c2d3e4f5a6
        format: uuid
        type: string
      signer_email:
        example: test@example.com
        type: string
      signature_request_id:
        example: 6c82bd7a-d7f7-45e0-82f4-b92222567346
        format: uuid
        nullable: true
        type: string
      signature_request_name:
        example: Signature Name
        type: string
      signature_level:
        description: Level of the Signature Request.
        enum:
        - simple_electronic_signature
        - advanced_electronic_signature
        - electronic_signature_with_qualified_certificate
        - qualified_electronic_signature
        example: simple_electronic_signature
        type: string
      signer_identification:
        description: Identification of the Signer.
        enum:
        - identity_verification
        - saved_identity
        type: string
      identified_at:
        description: Identification time of the signer
        example: '2024-05-01 12:00:00'
        type: string
      identification_status:
        description: Status of the identification.
        enum:
        - succeeded
        - rejected
        example: rejected
        type: string
      identification_reasons:
        example:
        - too_blury
        items:
          description: The reasons why the Signer failed to verify their identity.
          enum:
          - bad_internet_connection
          - document_expiry_date_missing
          - document_invalid_failed_owner
          - document_invalid_failed_rule
          - document_invalid_part_hidden
          - document_invalid_part_missing
          - face_identification_invalid
          - fraud_attempt_detected
          - identity_firstname_lastname_inversion
          - identity_firstname_mismatch
          - identity_firstname_missing
          - identity_lastname_mismatch
          - identity_probably_missing_firstname_parts
          - identity_probably_missing_lastname_parts
          - identity_probably_too_many_firstname_parts
          - identity_probably_too_many_lastname_parts
          - internal_error
          - video_quality_insufficient
          - too_blury
          - document_version_not_accepted
          - document_not_original
          - face_identity_inconsistency
          - altered_materials
          - unknown
          type: string
        nullable: true
        type: array
      sender_id:
        example: 0e8f7f8a-1b2c-4d3e-9f0a-b1c2d3e4f5a6
        format: uuid
        nullable: true
        type: string
      sender_email:
        example: test@example.com
        nullable: true
        type: string
      authentication_key:
        description: Identifier of the key used for the operation.
        example: authkey_live_2x1s3k9p
        nullable: true
        type: string
      authentication_key_description:
        description: Description of the key used for the operation.
        nullable: true
        type: string
      external_id:
        description: Optional user-defined identifier.
        example: ext-12345
        nullable: true
        type: string
      workspace_id:
        example: 9b6ed2f3-244f-487a-baa1-bbe4f51c8748
        format: uuid
        nullable: true
        type: string
      workspace_name:
        description: Name of the workspace.
        example: My workspace
        type: string
      signer_fullname:
        description: Full name of the signer.
        example: Jane Doe
        type: string
      workspace_external_name:
        description: External name of the workspace.
        example: My workspace
        nullable: true
        type: string
    required:
    - authentication_key
    - authentication_key_description
    - created_at
    - external_id
    - identification_reasons
    - identification_status
    - identified_at
    - sender_email
    - sender_id
    - signature_level
    - signature_request_id
    - signature_request_name
    - signer_email
    - signer_fullname
    - signer_id
    - signer_identification
    - workspace_external_name
    - workspace_id
    - workspace_name
    type: object
  InvitedSignersConsumption:
    properties:
      created_at:
        description: Creation time of the record
        example: '2024-05-01 12:00:00'
        type: string
      signer_id:
        example: 0e8f7f8a-1b2c-4d3e-9f0a-b1c2d3e4f5a6
        format: uuid
        type: string
      signer_email:
        example: test@example.com
        type: string
      signature_request_id:
        example: 6c82bd7a-d7f7-45e0-82f4-b92222567346
        format: uuid
        nullable: true
        type: string
      signature_request_name:
        example: Signature Name
        type: string
      signature_level:
        description: Level of the Signature Request.
        enum:
        - simple_electronic_signature
        - advanced_electronic_signature
        - electronic_signature_with_qualified_certificate
        - qualified_electronic_signature
        example: simple_electronic_signature
        type: string
      sender_id:
        example: 0e8f7f8a-1b2c-4d3e-9f0a-b1c2d3e4f5a6
        format: uuid
        nullable: true
        type: string
      sender_email:
        example: test@example.com
        nullable: true
        type: string
      source:
        description: Origin of the operation.
        example: app
        type: string
      connector:
        description: Signature request origin.
        enum:
        - app
        - public_api
        - connector_salesforce_api
        - hubspot_integration
        - connector_google_api
        - connector_zapier_api
        example: app
        nullable: true
        type: string
      authentication_key:
        description: Identifier of the key used for the operation.
        example: authkey_live_2x1s3k9p
        nullable: true
        type: string
      authentication_key_description:
        description: Description of the key used for the operation.
        nullable: true
        type: string
      external_id:
        description: Optional user-defined identifier.
        example: ext-12345
        nullable: true
        type: string
      workspace_id:
        example: 9b6ed2f3-244f-487a-baa1-bbe4f51c8748
        format: uuid
        nullable: true
        type: string
      workspace_name:
        description: Name of the workspace.
        example: My workspace
        type: string
      signer_fullname:
        description: Full name of the signer.
        example: Jane Doe
        type: string
      workspace_external_name:
        description: External name of the workspace.
        example: My workspace
        nullable: true
        type: string
    required:
    - authentication_key
    - authentication_key_description
    - connector
    - created_at
    - external_id
    - sender_email
    - sender_id
    - signature_level
    - signature_request_id
    - signature_request_name
    - signer_email
    - signer_fullname
    - signer_id
    - source
    - workspace_external_name
    - workspace_id
    - workspace_name
    type: object
