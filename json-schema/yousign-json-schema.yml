  IdentityDocumentFull_allOf_data_extracted_from_document:
    description: Information extracted from the verified identity document
    properties:
      first_name:
        description: The document holder's first name as it appears on the identity
          document
        example: John
        minLength: 1
        nullable: true
        type: string
      birth_name:
        description: The document holder's birth name (family name at birth)
        example: Doe
        minLength: 1
        nullable: true
        type: string
      last_name:
        description: The document holder's current last name (may differ from birth
          name)
        example: Doe
        minLength: 1
        nullable: true
        type: string
      born_on:
        description: The document holder's date of birth as it appears on the document
        example: '2024-01-18'
        format: date
        nullable: true
        type: string
      birth_location:
        description: The holder's place of birth as it appears on the document
        example: Paris
        minLength: 1
        nullable: true
        type: string
      gender:
        description: The holder's gender as it appears on the document. "m" for Male,
          "f" for Female, "x" for Non-binary or unspecified.
        enum:
        - f
        - m
        - x
        - null
        example: f
        nullable: true
        type: string
      full_address:
        description: The holder's complete postal address as it appears on the document
        example: '13 RUE SAINT MARCELIN

          MARSEILLE 10E (13)'
        minLength: 1
        nullable: true
        type: string
      type:
        description: The type of identity document that was verified
        enum:
        - id_card
        - passport
        - residence_permit
        - ita_ts_cns
        - null
        example: id_card
        nullable: true
        type: string
      issuing_country_code:
        description: The country that issued the document (ISO 3166-1 alpha-2 code)
        example: US
        format: ISO 3166-1 alpha-2
        nullable: true
        pattern: ^[A-Za-z]{2}$
        type: string
      issued_on:
        description: The date when the document was issued
        example: '2024-01-18'
        format: date
        nullable: true
        pattern: ^\d{4}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])$
        type: string
      expired_on:
        description: The date when the document legally expires
        example: '2024-01-18'
        format: date
        nullable: true
        pattern: ^\d{4}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])$
        type: string
      document_number:
        description: Document identifier number (may contain letters)
        example: X4RTBPFW4
        nullable: true
        type: string
      mrz:
        $ref: '#/components/schemas/IdentityDocumentFull_allOf_data_extracted_from_document_mrz'
      national_identification_number:
        description: 'Some documents may contain a national identification number.

          For example, Italian ID cards contain the Codice Fiscale on the back of
          the document.

          When this data is available on the document, it will be returned here, otherwise
          it will be NULL.

          Consult our [guide](https://developers.yousign.com/docs/identity-document-verification)
          for more details and examples.

          '
        example: MLLSNT82P65Z404U
        nullable: true
        type: string
    required:
    - birth_location
    - birth_name
    - born_on
    - document_number
    - expired_on
    - first_name
    - full_address
    - gender
    - issued_on
    - issuing_country_code
    - last_name
    - mrz
    - national_identification_number
    - type
    type: object
  IdentityDocumentFull_allOf_data:
    properties:
      extracted_from_document:
        $ref: '#/components/schemas/IdentityDocumentFull_allOf_data_extracted_from_document'
    required:
    - extracted_from_document
    type: object
