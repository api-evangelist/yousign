      insert_after_id:
        description: 'ID of the recipient this one must follow in an ordered flow;
          they will only be asked to act after that recipient.

          When `custom_recipient_order` is enabled, this can reference any approver
          or signer.

          When `custom_recipient_order` is disabled, the referenced ID must be a signer.
          `ordered_signers` must be enabled on the Signature Request.

          '
        example: 8b6ed2f3-244f-487a-baa1-bbe4f51c8744
        format: uuid
        nullable: true
        type: string
      group_with_id:
        description: 'ID of another recipient (Approver or Signer); both will be allowed
          to act in parallel in an ordered flow.

          Only available when `custom_recipient_order` is enabled.

          '
        example: 8b6ed2f3-244f-487a-baa1-bbe4f51c8744
        format: uuid
        nullable: true
